<!DOCTYPE html>
<html>
<head>
    <title>Diamond Sports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef1f5;
        }

        header {
            background: #000;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
        }

        .admin {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 10px;
            margin-top: 10px;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">💎 Diamond Sports</div>
    <p>All Sports Items Available</p>
</header>

<div class="container">

    <!-- LOGIN -->
    <button onclick="login()">🔐 Admin Login</button>

    <!-- ADMIN PANEL -->
    <div class="admin" id="adminPanel">
        <h3>Add Product</h3>
        <input type="text" id="name" placeholder="Product Name">
        <input type="text" id="price" placeholder="Price">
        <input type="text" id="img" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <!-- PRODUCTS -->
    <div class="products" id="productList"></div>

    <!-- MAP -->
    <h3>📍 Our Location</h3>
    <iframe src="https://maps.google.com/maps?q=Chandametta&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

<footer>
    📞 8815824753 | Diamond Sports
</footer>

<script>

let password = "1234"; // CHANGE THIS PASSWORD
let products = JSON.parse(localStorage.getItem("products")) || [];

function login() {
    let pass = prompt("Enter Admin Password:");
    if (pass === password) {
        document.getElementById("adminPanel").style.display = "block";
    } else {
        alert("Wrong Password!");
    }
}

function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let img = document.getElementById("img").value;

    if (!name || !price || !img) {
        alert("Fill all fields");
        return;
    }

    products.push({name, price, img});
    localStorage.setItem("products", JSON.stringify(products));
    displayProducts();
}

function displayProducts() {
    let list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach(p => {
        list.innerHTML += `
            <div class="card">
                <img src="${p.img}" width="100%">
                <h3>${p.name}</h3>
                <p class="price">₹${p.price}</p>

                <button onclick="order('${p.name}')">Order</button>
                <button onclick="pay(${p.price})">Pay</button>
            </div>
        `;
    });
}

function order(product) {
    window.open(`https://wa.me/918815824753?text=I want ${product}`);
}

function pay(amount) {
    window.location.href = `upi://pay?pa=yourupi@upi&pn=DiamondSports&am=${amount}&cu=INR`;
}

displayProducts();

</script>

</body>
</html>
